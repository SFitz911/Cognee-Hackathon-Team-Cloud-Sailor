<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Explorer — Wolfpack Recall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <section class="view explorer">
    <header class="topbar">
      <a href="/" class="btn btn-back">← poster</a>
      <a href="/investigate.html" class="btn btn-back">🔎 Investigation</a>
      <div class="brand">
        <span class="brand-mark">GRAPH</span>
        <span class="brand-sub">EXPLORER</span>
      </div>

      <div class="explorer-controls">
        <div class="graph-toggle">
          <button id="tab-map" class="gtab active" type="button">🗺️ Storyline map</button>
          <button id="tab-brain" class="gtab" type="button">🧠 Cognee Brain</button>
        </div>
        <label class="ds-picker" id="ds-wrap" hidden>
          <span>dataset</span>
          <select id="ds-select"></select>
        </label>
      </div>

      <div class="status" id="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">connecting…</span>
      </div>
    </header>

    <div class="explorer-stage">
      <div id="graph" class="explorer-graph"></div>
      <iframe id="brain-frame" class="explorer-graph hidden" title="Cognee knowledge graph" loading="lazy"></iframe>
      <div class="explorer-hint" id="explorer-hint">
        🗺️ Storyline map — our narrative. Flip to 🧠 Cognee Brain to see Cognee's real graph (their UI), and pick any dataset.
      </div>
    </div>
  </section>

  <script src="/js/common.js"></script>
  <script src="/js/graph.js"></script>
</body>
</html>
