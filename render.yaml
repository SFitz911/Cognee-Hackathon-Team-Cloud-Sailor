# Render Blueprint — Wolfpack Recall (Hangover 4: Berlin)
# Docker runtime so DeepFace/OpenCV (Page 3 Face ID) works in the cloud.
# Deploy: push to GitHub, then Render Dashboard -> Blueprint -> Manual sync.
# Set the four secret env vars (sync:false) in the dashboard.
services:
  - type: web
    name: wolfpack-recall
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard          # 2 GB RAM — needed for TensorFlow/DeepFace
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: COGNEE_DATASET
        value: pinky_serbia
      # Public deploy runs on Claude Haiku (~15x cheaper than Opus) so strangers
      # can't run up a meaningful bill. Override to claude-opus-4-8 for a local demo.
      - key: WOLFPACK_MODEL
        value: claude-haiku-4-5
      # Per-IP rate limit for the Claude-backed endpoints (max requests / window secs).
      - key: WOLFPACK_RATE_MAX
        value: "6"
      - key: WOLFPACK_RATE_WINDOW
        value: "600"
      # --- secrets: set these in the Render dashboard (not committed) ---
      - key: COGNEE_BASE_URL
        sync: false
      - key: COGNEE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
